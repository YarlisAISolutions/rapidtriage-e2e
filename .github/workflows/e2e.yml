name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 13 * * *'  # daily 13:00 UTC
  workflow_dispatch:

jobs:
  public-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RAPIDTRIAGE_BASE_URL: https://rapidtriage.me
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run public suite
        run: npx playwright test --project=api --project=marketing --project=protected --project=onboarding
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
